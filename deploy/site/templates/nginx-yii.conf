# Nginx template untuk Yii2 Advanced
# Variabel yang diganti saat create:
#   {{DOMAIN}}       - domain utama (contoh: siperisai.my.id)
#   {{ROOT}}         - path ke folder root aplikasi (contoh: /home/wanforge/www/siperisai)
#   {{PHP_VERSION}}  - versi PHP (contoh: 8.3)
#   {{WWW_BLOCK}}    - www redirect block (diisi atau kosong)

{{WWW_BLOCK}}

# === FRONTEND ===
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};
    root {{ROOT}}/frontend/web;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    index index.php;
    charset utf-8;

    gzip on;
    gzip_types
        text/plain text/css application/json
        application/javascript text/xml application/xml
        application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php{{PHP_VERSION}}-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    # Block sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    client_max_body_size 64M;

    access_log /var/log/nginx/{{DOMAIN}}.access.log;
    error_log  /var/log/nginx/{{DOMAIN}}.error.log;
}

# === BACKEND ===
